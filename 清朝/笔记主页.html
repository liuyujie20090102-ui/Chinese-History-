<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>清代筆記 · DSE 學習站</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f7f4ed;
            --text-primary: #2c2416;
            --text-secondary: #5c5347;
            --text-muted: #a09880;
            --gold: #8b6914;
            --ink-light: rgba(60,40,20,0.06);
            --mountain-far: rgba(120,100,70,0.12);
            --mountain-mid: rgba(100,80,55,0.16);
            --mountain-near: rgba(80,60,40,0.2);
            --cloud: rgba(255,252,245,0.7);
            --card-bg: rgba(255,253,248,0.75);
            --card-border: rgba(180,160,130,0.25);
            --shadow-sm: 0 2px 16px rgba(60,40,20,0.04);
            --shadow-hover: 0 6px 24px rgba(60,40,20,0.08);
            --radius: 16px;
            --font-cn: "Noto Serif TC","PingFang SC","Microsoft YaHei","KaiTi",serif;
            --font-en: "Inter","Helvetica Neue",sans-serif;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        html{scroll-behavior:smooth}
        body{
            background-color:var(--bg);
            font-family:var(--font-cn);
            min-height:100vh;
            display:flex;
            flex-direction:column;
            align-items:center;
            padding:40px 24px 60px;
            position:relative;
            overflow-x:hidden;
            -webkit-font-smoothing:antialiased;
        }
        body::before{
            content:"";
            position:fixed;top:0;left:0;
            width:100%;height:100%;
            pointer-events:none;z-index:0;
            background-image:
                repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(139,119,80,0.012) 3px,rgba(139,119,80,0.012) 4px),
                repeating-linear-gradient(90deg,transparent,transparent 5px,rgba(139,119,80,0.008) 5px,rgba(139,119,80,0.008) 6px);
            opacity:0.7;
        }
        .mountains{position:fixed;bottom:0;left:0;width:100%;height:30%;pointer-events:none;z-index:0}
        .mountain{position:absolute;bottom:0}
        .mountain.m1{left:-8%;width:45%;height:55%;background:var(--mountain-far);border-radius:55% 55% 0 0}
        .mountain.m2{left:22%;width:50%;height:68%;background:var(--mountain-mid);border-radius:50% 48% 0 0}
        .mountain.m3{right:-8%;width:42%;height:60%;background:var(--mountain-near);border-radius:52% 52% 0 0}
        .clouds{position:fixed;bottom:12%;left:0;width:100%;height:18%;pointer-events:none;z-index:0}
        .cloud{position:absolute;background:var(--cloud);border-radius:50%;filter:blur(28px)}
        .cloud.c1{width:260px;height:50px;left:8%;bottom:30px;opacity:0.5}
        .cloud.c2{width:220px;height:42px;right:12%;bottom:15px;opacity:0.4}
        .cloud.c3{width:180px;height:35px;left:50%;bottom:8px;opacity:0.35;transform:translateX(-50%)}
        .birds{position:fixed;top:12%;right:12%;pointer-events:none;z-index:0;opacity:0.3}
        .bird{display:inline-block;font-size:13px;margin:0 5px;animation:birdFloat 6s ease-in-out infinite}
        .bird:nth-child(2){animation-delay:1.5s;font-size:9px}
        .bird:nth-child(3){animation-delay:3s;font-size:11px}
        @keyframes birdFloat{
            0%,100%{transform:translateY(0) translateX(0)}
            25%{transform:translateY(-7px) translateX(3px)}
            50%{transform:translateY(-2px) translateX(8px)}
            75%{transform:translateY(-9px) translateX(3px)}
        }
        .container{position:relative;z-index:1;width:100%;max-width:600px}
        .back-link{display:inline-block;color:var(--text-muted);text-decoration:none;font-size:14px;margin-bottom:32px;letter-spacing:1px;transition:color 0.3s}
        .back-link:hover{color:var(--text-primary)}
        .page-title{text-align:center;font-size:28px;font-weight:700;color:var(--text-primary);letter-spacing:4px;margin-bottom:40px}

        .note-card{
            background:var(--card-bg);
            backdrop-filter:blur(8px);
            -webkit-backdrop-filter:blur(8px);
            border:1px solid var(--card-border);
            border-radius:var(--radius);
            padding:24px 28px;
            margin-bottom:20px;
            box-shadow:var(--shadow-sm);
            cursor:pointer;
            text-decoration:none;
            display:block;
            transition:all 0.3s;
        }
        .note-card:hover{
            transform:translateY(-3px);
            box-shadow:var(--shadow-hover);
            border-color:rgba(139,105,20,0.25);
        }
        .note-card .card-title{
            font-size:20px;
            font-weight:700;
            color:var(--text-primary);
            letter-spacing:2px;
            margin-bottom:8px;
        }
        .note-card .card-desc{
            font-size:14px;
            color:var(--text-muted);
            letter-spacing:1px;
        }

        .section-header{text-align:center;margin-bottom:24px}
        .section-header .section-title{font-size:18px;font-weight:600;color:var(--text-muted);letter-spacing:3px}

        .footer{text-align:center;font-family:var(--font-en);font-size:11px;color:var(--text-muted);letter-spacing:2px;padding-top:24px}
        .footer .name{font-weight:500;color:var(--text-secondary)}

        @media(max-width:480px){
            .page-title{font-size:24px}
            .note-card{padding:20px 18px}
            .note-card .card-title{font-size:17px}
            .note-card .card-desc{font-size:13px}
        }
    </style>
</head>
<body>

    <div class="mountains">
        <div class="mountain m1"></div>
        <div class="mountain m2"></div>
        <div class="mountain m3"></div>
    </div>
    <div class="clouds">
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
        <div class="cloud c3"></div>
    </div>
    <div class="birds">
        <span class="bird">⩳</span>
        <span class="bird">⩳</span>
        <span class="bird">⩳</span>
    </div>

    <div class="container">
        <a href="1.html" class="back-link">← 返回清朝</a>
        <div class="page-title">📖 清代筆記</div>
        <div class="section-header"><span class="section-title">── 請選擇筆記 ──</span></div>

        <a href="康熙笔记.html" class="note-card">
            <div class="card-title">康熙筆記</div>
            <div class="card-desc">康熙帝的中央集權措施與統治政策</div>
        </a>
        <a href="雍正笔记.html" class="note-card">
            <div class="card-title">雍正筆記</div>
            <div class="card-desc">雍正帝的中央集權措施與統治政策</div>
        </a>
        <a href="清初民族政策.html" class="note-card">
            <div class="card-title">清初民族政策</div>
            <div class="card-desc">清代初期的民族政策與統治方針</div>
        </a>

        <div class="footer">── <span class="name">Shelly Liu</span> ──</div>
    </div>

</body>
</html>
